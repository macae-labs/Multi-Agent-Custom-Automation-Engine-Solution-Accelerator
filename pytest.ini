[pytest]
pythonpath = src/backend src
testpaths =
    src/tests/backend/v4
asyncio_mode = strict
addopts = --strict-markers
markers =
    unit: Fast tests with mocks, no external services
    integration: Tests that require real Azure services
    e2e: End-to-end tests requiring full environment
    v4: Tests for v4 architecture (Foundry/MCP)