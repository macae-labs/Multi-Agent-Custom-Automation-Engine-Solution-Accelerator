name: Validate WAF Deployment

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'GitHub Environment to use'
        required: false
        type: choice
        default: dev
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

env:
  QUOTA_FAILED: 'false'
  RESOURCE_GROUP_NAME: ''
  AZURE_LOCATION: ''
  OPENAI_RESOURCE_NAME: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target_env || 'dev' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run Quota Check
        id: quota-check
        run: |
          set -o pipefail
          export AZURE_SUBSCRIPTION_ID="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          export GPT_MIN_CAPACITY="150"
          export AZURE_REGIONS="${{ vars.AZURE_REGIONS }}"

          chmod +x infra/scripts/checkquota.sh
          if ! infra/scripts/checkquota.sh 2>&1 | tee /tmp/quota-check.log; then
            # If quota check fails due to insufficient quota, set the flag
            if grep -q "No region with sufficient quota found" /tmp/quota-check.log; then
              echo "quota_failed=true" >> $GITHUB_OUTPUT
              exit 1
            fi
            exit 1  # Fail the pipeline if any other failure occurs
          fi
          echo "quota_failed=false" >> $GITHUB_OUTPUT

      - name: Send Notification on Quota Failure
        if: failure() && steps.quota-check.outputs.quota_failed == 'true'
        run: |
          curl -X POST "${{ secrets.ALERT_LOGIC_APP_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"context":"quota","severity":"error","workflow":"deploy-waf.yml","message":"Quota check failed. Pipeline cannot proceed.","run_url":"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
            || echo "Failed to send notification"

      - name: Fail Pipeline if Quota Check Fails
        if: steps.quota-check.outputs.quota_failed == 'true'
        run: exit 1

      - name: Set Deployment Region
        run: |
          if [ -z "$VALID_REGION" ]; then
            VALID_REGION="${{ vars.AZURE_LOCATION }}"
          fi
          if [ -z "$VALID_REGION" ]; then
            VALID_REGION="eastus2"
          fi
          echo "Selected Region: $VALID_REGION"
          echo "AZURE_LOCATION=$VALID_REGION" >> $GITHUB_ENV

      - name: Setup Azure CLI
        run: az --version

      - name: Install Bicep CLI
        run: az bicep install

      - name: Generate Resource Group Name
        id: generate_rg_name
        run: |
          echo "Generating a unique resource group name..."
          ACCL_NAME="macae"  # Account name as specified
          SHORT_UUID=$(uuidgen | cut -d'-' -f1)
          UNIQUE_RG_NAME="arg-${ACCL_NAME}-${SHORT_UUID}"
          echo "RESOURCE_GROUP_NAME=${UNIQUE_RG_NAME}" >> $GITHUB_ENV
          echo "Generated Resource_GROUP_PREFIX: ${UNIQUE_RG_NAME}"

      - name: Check and Create Resource Group
        id: check_create_rg
        run: |
          set -e
          echo "Checking if resource group exists..."
          rg_exists=$(az group exists --name ${{ env.RESOURCE_GROUP_NAME }})
          if [ "$rg_exists" = "false" ]; then
            echo "Resource group does not exist. Creating..."
            az group create --name ${{ env.RESOURCE_GROUP_NAME }} --location ${{ env.AZURE_LOCATION }} || { echo "Error creating resource group"; exit 1; }
          else
            echo "Resource group already exists."
          fi

      - name: Generate Unique Solution Prefix
        id: generate_solution_prefix
        run: |
          COMMON_PART="macae"
          TIMESTAMP=$(date +%s)
          UPDATED_TIMESTAMP=$(echo $TIMESTAMP | tail -c 6)
          UNIQUE_SOLUTION_PREFIX="${COMMON_PART}${UPDATED_TIMESTAMP}"
          echo "SOLUTION_PREFIX=${UNIQUE_SOLUTION_PREFIX}" >> $GITHUB_OUTPUT
          echo "SOLUTION_PREFIX=${UNIQUE_SOLUTION_PREFIX}" >> $GITHUB_ENV

      - name: Deploy Bicep Template
        id: deploy
        run: |
          set -e
          VM_ADMIN_USERNAME="${{ secrets.WAF_VM_ADMIN_USERNAME }}"
          VM_ADMIN_PASSWORD="${{ secrets.WAF_VM_ADMIN_PASSWORD }}"
          if [ -z "$VM_ADMIN_USERNAME" ] || [ -z "$VM_ADMIN_PASSWORD" ]; then
            echo "Missing required secrets WAF_VM_ADMIN_USERNAME and/or WAF_VM_ADMIN_PASSWORD"
            exit 1
          fi
          VIRTUAL_MACHINE_CONFIGURATION=$(jq -cn --arg u "$VM_ADMIN_USERNAME" --arg p "$VM_ADMIN_PASSWORD" '{adminUsername:$u,adminPassword:$p}')
          az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP_NAME }} \
            --template-file infra/main.bicep \
            --parameters \
              environmentName=${{ steps.generate_solution_prefix.outputs.SOLUTION_PREFIX }} \
              solutionLocation="${{ env.AZURE_LOCATION }}" \
              useWafAlignedArchitecture=true \
              aiDeploymentsLocation='${{ env.AZURE_LOCATION }}' \
              gptModelCapacity=5 \
              virtualMachineConfiguration="$VIRTUAL_MACHINE_CONFIGURATION" \
              logAnalyticsWorkspaceConfiguration='{"existingWorkspaceResourceId": ""}'

      - name: Send Notification on Failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.ALERT_LOGIC_APP_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"context":"waf-deploy","severity":"error","workflow":"deploy-waf.yml","message":"WAF deployment failed.","run_url":"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
            || echo "Failed to send notification"

      - name: Get OpenAI Resource from Resource Group
        id: get_openai_resource
        run: |


          set -e
          echo "Fetching OpenAI resource from resource group ${{ env.RESOURCE_GROUP_NAME }}..."

          # Run the az resource list command to get the OpenAI resource name
          openai_resource_name=$(az resource list --resource-group ${{ env.RESOURCE_GROUP_NAME }} --resource-type "Microsoft.CognitiveServices/accounts" --query "[0].name" -o tsv)

          if [ -z "$openai_resource_name" ]; then
            echo "No OpenAI resource found in resource group ${{ env.RESOURCE_GROUP_NAME }}."
            exit 0
          else
            echo "OPENAI_RESOURCE_NAME=${openai_resource_name}" >> $GITHUB_ENV
            echo "OpenAI resource name: ${openai_resource_name}"
          fi

      - name: Delete Bicep Deployment
        if: always()
        run: |
          set -e
          echo "Checking if resource group exists..."
          rg_exists=$(az group exists --name ${{ env.RESOURCE_GROUP_NAME }})
          if [ "$rg_exists" = "true" ]; then
            echo "Resource group exist. Cleaning..."
            az group delete \
                --name ${{ env.RESOURCE_GROUP_NAME }} \
                --yes \
                --no-wait
            echo "Resource group deleted...  ${{ env.RESOURCE_GROUP_NAME }}"
          else
            echo "Resource group does not exists."
          fi

      - name: Wait for resource deletion to complete
        run: |


          # Add resources to the array
          resources_to_check=("${{ env.OPENAI_RESOURCE_NAME }}")

          echo "List of resources to check: ${resources_to_check[@]}"

          # Maximum number of retries
          max_retries=3

          # Retry intervals in seconds (30, 60, 120)
          retry_intervals=(30 60 120)

          # Retry mechanism to check resources
          retries=0
          while true; do
            resource_found=false

            # Get the list of resources in YAML format again on each retry
            resource_list=$(az resource list --resource-group ${{ env.RESOURCE_GROUP_NAME }} --output yaml)

            # Iterate through the resources to check
            for resource in "${resources_to_check[@]}"; do
              echo "Checking resource: $resource"
              if echo "$resource_list" | grep -q "name: $resource"; then
                echo "Resource '$resource' exists in the resource group."
                resource_found=true
              else
                echo "Resource '$resource' does not exist in the resource group."
              fi
            done

            # If any resource exists, retry
            if [ "$resource_found" = true ]; then
              retries=$((retries + 1))
              if [ "$retries" -gt "$max_retries" ]; then
                echo "Maximum retry attempts reached. Exiting."
                break
              else
                # Wait for the appropriate interval for the current retry
                echo "Waiting for ${retry_intervals[$retries-1]} seconds before retrying..."
                sleep ${retry_intervals[$retries-1]}
              fi
            else
              echo "No resources found. Exiting."
              break
            fi
          done

      - name: Purging the Resources
        if: always()
        run: |

          set -e
          echo "Azure OpenAI: ${{ env.OPENAI_RESOURCE_NAME }}"
          if [ -z "${{ env.OPENAI_RESOURCE_NAME }}" ]; then
            echo "No OpenAI resource to purge. Skipping."
            exit 0
          fi

          # Purge OpenAI Resource
          echo "Purging the OpenAI Resource..."
          if ! az resource delete --ids /subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/providers/Microsoft.CognitiveServices/locations/eastus/resourceGroups/${{ env.RESOURCE_GROUP_NAME }}/deletedAccounts/${{ env.OPENAI_RESOURCE_NAME }} --verbose; then
            echo "Failed to purge openai resource: ${{ env.OPENAI_RESOURCE_NAME }}"
          else
            echo "Purged the openai resource: ${{ env.OPENAI_RESOURCE_NAME }}"
          fi

          echo "Resource purging completed successfully"
