name: Build Docker (Validation Only)

# =============================================================================
# IMPORTANT: Azure Container Apps CD handles automatic deployments from ACR.
# This workflow only builds and validates Docker images.
# Deployments are handled by Azure CD workflows.
# =============================================================================

on:
  push:
    branches:
      - main
      - dev
      - demo
      - hotfix
    paths:
      - 'src/backend/**'
      - 'src/frontend/**'
      - '**/Dockerfile'
      - '.github/workflows/docker-build-and-push.yml'
  pull_request:
    types:
      - opened
      - ready_for_review
      - reopened
      - synchronize
    branches:
      - main
      - dev
      - demo
      - hotfix
    paths:
      - 'src/backend/**'
      - 'src/frontend/**'
      - '**/Dockerfile'
      - '.github/workflows/docker-build-and-push.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}
  ACR: ${{ secrets.ACR_LOGIN_SERVER != '' && secrets.ACR_LOGIN_SERVER || format('{0}.azurecr.io', secrets.ACR_NAME) }}
  TAG: ${{ github.sha }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        continue-on-error: true
        with:
          filters: |
            backend:
              - 'src/backend/**'
            frontend:
              - 'src/frontend/**'

      - name: Check mode
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "🔨 Manual run detected - build validation only"
          else
            echo "🔨 Push/PR detected - build validation only"
          fi
          echo "ℹ️  Azure CD handles deployment"

  # =============================================================================
  # BUILD-ONLY JOB: Runs on push/PR and workflow_dispatch
  # =============================================================================
  build-backend-only:
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (validation only)
        uses: docker/build-push-action@v6
        with:
          context: src/backend
          file: src/backend/Dockerfile
          push: false
          tags: |
            macaebackend:${{ env.TAG }}
            macaebackend:latest

      - name: Build validation complete
        run: |
          echo "✅ Backend Docker image built successfully"
          echo "ℹ️  Image NOT pushed - deployment handled by Azure CD"

  # =============================================================================
  # BUILD-ONLY FRONTEND: Runs on push/PR and workflow_dispatch
  # =============================================================================
  build-frontend-only:
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image (validation only)
        uses: docker/build-push-action@v6
        with:
          context: src/frontend
          file: src/frontend/Dockerfile
          push: false
          tags: |
            macaefrontend:${{ env.TAG }}
            macaefrontend:latest

      - name: Build validation complete
        run: |
          echo "✅ Frontend Docker image built successfully"
          echo "ℹ️  Image NOT pushed - deployment handled by Azure CD"
