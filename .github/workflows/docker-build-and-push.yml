name: Build Docker and Optional Push

on:
  push:
    branches:
      - main
      - dev
      - demo
      - hotfix
    paths:
      - 'src/backend/**'
      - 'src/frontend/**'
      - '**/Dockerfile'
      - '.github/workflows/docker-build-and-push.yml'
  pull_request:
    types:
      - opened
      - ready_for_review
      - reopened
      - synchronize
    branches:
      - main
      - dev
      - demo
      - hotfix
    paths:
      - 'src/backend/**'
      - 'src/frontend/**'
      - '**/Dockerfile'
      - '.github/workflows/docker-build-and-push.yml'
  workflow_dispatch:
    inputs:
      target_env:
        description: "GitHub Environment to use"
        required: false
        type: choice
        default: dev
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}
  ACR: ${{ secrets.ACR_LOGIN_SERVER != '' && secrets.ACR_LOGIN_SERVER || format('{0}.azurecr.io', secrets.ACR_NAME) }}
  TAG: ${{ github.sha }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      should_deploy: ${{ steps.check_deploy.outputs.should_deploy }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/backend/**'
            frontend:
              - 'src/frontend/**'
      
      - name: Check if deployment should occur
        id: check_deploy
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi

  build-and-push-backend:
    needs: changes
    if: |
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true') &&
      needs.changes.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target_env || 'dev' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: ACR Login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: src/backend
          file: src/backend/Dockerfile
          push: true
          tags: |
            ${{ env.ACR }}/macaebackend:latest
            ${{ env.ACR }}/macaebackend:${{ env.TAG }}

      - name: Capture current active revision
        id: capture_previous
        run: |
          RG="${{ secrets.BACKEND_RG }}"
          APP="${{ secrets.BACKEND_CONTAINER_APP }}"
          PREVIOUS_REVISION=$(az containerapp revision list \
            -n "$APP" -g "$RG" \
            --query "[?properties.active==\`true\`][0].name" -o tsv)
          echo "previous_revision=$PREVIOUS_REVISION" >> $GITHUB_OUTPUT
          echo "Previous active revision: ${PREVIOUS_REVISION:-none}"

      - name: Update Container App
        id: update_backend
        run: |
          RG="${{ secrets.BACKEND_RG }}"
          if [ -z "$RG" ]; then
            echo "Missing secret BACKEND_RG"
            exit 1
          fi
          az containerapp update \
            -n ${{ secrets.BACKEND_CONTAINER_APP }} \
            -g "$RG" \
            --image ${{ env.ACR }}/macaebackend:${{ env.TAG }}

      - name: Capture new revision and app URL
        id: capture_new
        run: |
          RG="${{ secrets.BACKEND_RG }}"
          APP="${{ secrets.BACKEND_CONTAINER_APP }}"
          NEW_REVISION=$(az containerapp revision list \
            -n "$APP" -g "$RG" \
            --query "sort_by(@, &properties.createdTime)[-1].name" -o tsv)
          APP_FQDN=$(az containerapp show -n "$APP" -g "$RG" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          NEW_REVISION_FQDN=$(az containerapp revision list \
            -n "$APP" -g "$RG" \
            --query "[?name=='$NEW_REVISION'].properties.fqdn | [0]" -o tsv 2>/dev/null || true)
          echo "new_revision=$NEW_REVISION" >> $GITHUB_OUTPUT
          echo "app_url=https://$APP_FQDN" >> $GITHUB_OUTPUT
          echo "new_revision_url=https://$NEW_REVISION_FQDN" >> $GITHUB_OUTPUT
          echo "New revision: $NEW_REVISION"
          echo "App URL: https://$APP_FQDN"

      - name: Canary rollout (10% new, 90% previous)
        if: steps.capture_previous.outputs.previous_revision != ''
        run: |
          RG="${{ secrets.BACKEND_RG }}"
          APP="${{ secrets.BACKEND_CONTAINER_APP }}"
          az containerapp ingress traffic set \
            -n "$APP" -g "$RG" \
            --revision-weight \
            "${{ steps.capture_new.outputs.new_revision }}=10" \
            "${{ steps.capture_previous.outputs.previous_revision }}=90"

      - name: Smoke test backend
        id: smoke_test
        run: |
          set -e
          BASE_URL="${{ steps.capture_new.outputs.new_revision_url }}"
          if [ "$BASE_URL" = "https://" ] || [ -z "$BASE_URL" ]; then
            BASE_URL="${{ steps.capture_new.outputs.app_url }}"
          fi
          echo "Running smoke tests on: $BASE_URL"
          curl -fsS "$BASE_URL/healthz"
          curl -fsS -X POST "$BASE_URL/api/input_task" \
            -H "Content-Type: application/json" \
            -d '{"description":"CI smoke test","session_id":"ci-smoke"}'

      - name: Promote new revision to 100%
        if: success()
        run: |
          RG="${{ secrets.BACKEND_RG }}"
          APP="${{ secrets.BACKEND_CONTAINER_APP }}"
          az containerapp ingress traffic set \
            -n "$APP" -g "$RG" \
            --revision-weight "${{ steps.capture_new.outputs.new_revision }}=100"

      - name: Rollback to previous revision on failure
        if: failure() && steps.capture_previous.outputs.previous_revision != ''
        run: |
          RG="${{ secrets.BACKEND_RG }}"
          APP="${{ secrets.BACKEND_CONTAINER_APP }}"
          PREV="${{ steps.capture_previous.outputs.previous_revision }}"
          az containerapp ingress traffic set \
            -n "$APP" -g "$RG" \
            --revision-weight "$PREV=100"
          echo "Rollback executed to revision: $PREV"

  build-and-push-frontend:
    needs: changes
    if: |
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true') &&
      needs.changes.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target_env || 'dev' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push frontend image (ACR build)
        run: |
          if [ -z "${{ env.ACR_NAME }}" ]; then
            echo "Missing secret ACR_NAME"
            exit 1
          fi
          az acr build \
            --registry "${{ env.ACR_NAME }}" \
            --image "macaefrontend:latest" \
            --image "macaefrontend:${{ env.TAG }}" \
            --file src/frontend/Dockerfile \
            src/frontend

      - name: Update WebApp
        run: |
          RG="${{ secrets.FRONTEND_RG }}"
          if [ -z "$RG" ]; then
            echo "Missing secret FRONTEND_RG"
            exit 1
          fi
          az webapp config container set \
            -g "$RG" \
            -n ${{ secrets.FRONTEND_WEBAPP }} \
            --container-registry-url https://${{ env.ACR }} \
            --container-image-name ${{ env.ACR }}/macaefrontend:${{ env.TAG }}
          az webapp restart -g "$RG" -n ${{ secrets.FRONTEND_WEBAPP }}
