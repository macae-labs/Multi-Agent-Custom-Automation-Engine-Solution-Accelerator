name: Build Docker and Optional Push v4

# SECURITY: Changed to manual-only trigger to prevent automatic deployments
# Previously triggered on push to main/dev-v4/demo-v4/hotfix
# To run: Go to Actions tab > Select this workflow > Run workflow
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      push_images:
        description: 'Push images to ACR'
        required: true
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure
        if: ${{ github.ref_name == 'main' || github.ref_name == 'dev-v4'|| github.ref_name == 'demo-v4' || github.ref_name == 'hotfix' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        if: ${{ github.ref_name == 'main' || github.ref_name == 'dev-v4'|| github.ref_name == 'demo-v4' || github.ref_name == 'hotfix' }}
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER || 'acrlogin.azurecr.io' }}

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Get registry
        id: registry
        run: |
          echo "ext_registry=${{ secrets.ACR_LOGIN_SERVER || 'acrlogin.azurecr.io' }}" >> $GITHUB_OUTPUT

      - name: Determine Tag Name Based on Branch
        id: determine_tag
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "tag=latest_v4" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/dev-v4" ]]; then
            echo "tag=dev_v4" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/demo-v4" ]]; then
            echo "tag=demo_v4" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/hotfix" ]]; then
            echo "tag=hotfix" >> $GITHUB_OUTPUT
          else
            echo "tag=pullrequest-ignore" >> $GITHUB_OUTPUT
          fi

      - name: Set Historical Tag
        id: historical_tag
        run: |
          DATE_TAG=$(date +'%Y-%m-%d')
          RUN_ID=${{ github.run_number }}
          # Create historical tag using TAG, DATE_TAG, and RUN_ID
          echo "historical_tag=${{ steps.determine_tag.outputs.tag }}_${DATE_TAG}_${RUN_ID}" >> $GITHUB_OUTPUT

      - name: Build and optionally push Backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./src/backend
          file: ./src/backend/Dockerfile
          push: ${{ steps.determine_tag.outputs.tag != 'pullrequest-ignore' }}
          tags: |
            ${{ steps.registry.outputs.ext_registry }}/macaebackend:${{ steps.determine_tag.outputs.tag }}
            ${{ steps.registry.outputs.ext_registry }}/macaebackend:${{ steps.historical_tag.outputs.historical_tag }}
            ${{ steps.registry.outputs.ext_registry }}/macaebackend:${{ github.sha }}

      - name: Build and optionally push Frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./src/frontend
          file: ./src/frontend/Dockerfile
          push: ${{ steps.determine_tag.outputs.tag != 'pullrequest-ignore' }}
          tags: |
            ${{ steps.registry.outputs.ext_registry }}/macaefrontend:${{ steps.determine_tag.outputs.tag }}
            ${{ steps.registry.outputs.ext_registry }}/macaefrontend:${{ steps.historical_tag.outputs.historical_tag }}
            ${{ steps.registry.outputs.ext_registry }}/macaefrontend:${{ github.sha }}

      - name: Check MCP server path exists
        id: check_mcp
        run: |
          if [ -d "./src/mcp_server" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ MCP server path not found - skipping MCP build"
          fi

      - name: Build and optionally push MCP Docker image
        if: steps.check_mcp.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./src/mcp_server
          file: ./src/mcp_server/Dockerfile
          push: ${{ steps.determine_tag.outputs.tag != 'pullrequest-ignore' }}
          tags: |
            ${{ steps.registry.outputs.ext_registry }}/macaemcp:${{ steps.determine_tag.outputs.tag }}
            ${{ steps.registry.outputs.ext_registry }}/macaemcp:${{ steps.historical_tag.outputs.historical_tag }}
