name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend Lint + Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/backend/requirements.txt
          pip install ruff pytest

      - name: Backend lint (critical rules)
        run: |
          ruff check src/backend --select E9,F63,F7,F82

      - name: Backend unit tests (stable subset)
        run: |
          pytest -q src/backend/tests/test_config.py src/backend/tests/test_app.py

  frontend:
    name: Frontend Lint + Build + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Frontend lint
        working-directory: src/frontend
        run: npm run lint

      - name: Frontend build
        working-directory: src/frontend
        run: npm run build

      - name: Frontend tests
        working-directory: src/frontend
        run: npm run test -- --run

  infra:
    name: Validate YAML + Bicep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: YAML lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: |
            azure.yaml
            .github/workflows/
          config_file: .yamllint.yml

      - name: Validate Bicep compiles
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az bicep build --file infra/main.bicep
