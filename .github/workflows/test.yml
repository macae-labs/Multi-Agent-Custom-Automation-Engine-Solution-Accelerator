name: Test Workflow with Coverage

on:
  push:
    branches:
      - main
      - dev
      - demo
      - hotfix
    paths:
      - 'src/backend/**'
      - 'src/frontend/**'
      - 'pytest.ini'
      - '.github/workflows/test.yml'
  pull_request:
    types:
      - opened
      - ready_for_review
      - reopened
      - synchronize
    branches:
      - main
      - dev
      - demo
      - hotfix
    paths:
      - 'src/backend/**'
      - 'src/frontend/**'
      - 'pytest.ini'
      - '.github/workflows/test.yml'

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/backend/requirements.txt
          pip install pytest pytest-cov

      - name: Check if test files exist
        id: check_tests
        run: |
          if [ -z "$(find src/backend -type f -name 'test_*.py')" ]; then
            echo "No test files found, skipping tests."
            echo "skip_tests=true" >> $GITHUB_OUTPUT
          else
            echo "Test files found, running tests."
            echo "skip_tests=false" >> $GITHUB_OUTPUT
          fi

      - name: Run tests with coverage
        if: steps.check_tests.outputs.skip_tests != 'true'
        run: |
          cd src/backend
          pytest --cov=. --cov-report=term-missing --cov-report=xml
          
      - name: Skip coverage report if no tests
        if: steps.check_tests.outputs.skip_tests == 'true'
        run: |
          echo "Skipping coverage report because no tests were found."

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Frontend lint
        working-directory: src/frontend
        run: npm run lint

      - name: Frontend build
        working-directory: src/frontend
        run: npm run build

      - name: Check if frontend test files exist
        id: check_frontend_tests
        working-directory: src/frontend
        run: |
          if [ -z "$(find src -type f \( -name '*.test.ts' -o -name '*.test.tsx' -o -name '*.spec.ts' -o -name '*.spec.tsx' \))" ]; then
            echo "No frontend test files found, skipping tests."
            echo "skip_tests=true" >> $GITHUB_OUTPUT
          else
            echo "Test files found, running tests."
            echo "skip_tests=false" >> $GITHUB_OUTPUT
          fi

      - name: Frontend tests
        if: steps.check_frontend_tests.outputs.skip_tests != 'true'
        working-directory: src/frontend
        run: npm run test -- --run

      - name: Skip frontend tests notice
        if: steps.check_frontend_tests.outputs.skip_tests == 'true'
        run: echo "Skipping frontend tests - no test files found"

  infra-validation:
    name: Validate Infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: YAML lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: |
            azure.yaml
            .github/workflows/
          config_file: .yamllint.yml

      - name: Validate Bicep compiles
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az bicep build --file infra/main.bicep
