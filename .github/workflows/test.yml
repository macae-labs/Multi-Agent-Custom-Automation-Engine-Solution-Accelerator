name: Test Workflow with Coverage

on:
  push:
    branches:
      - main
      - dev
      - demo
      - hotfix
    paths:
      - 'src/backend/**'
      - 'src/frontend/**'
      - 'pytest.ini'
      - '.github/workflows/test.yml'
  pull_request:
    types:
      - opened
      - ready_for_review
      - reopened
      - synchronize
    branches:
      - main
      - dev
      - demo
      - hotfix
    paths:
      - 'src/backend/**'
      - 'src/frontend/**'
      - 'pytest.ini'
      - '.github/workflows/test.yml'

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    env:
      AZURE_OPENAI_ENDPOINT: https://mock-openai-endpoint.azure.com/
      AZURE_OPENAI_API_VERSION: 2024-05-01-preview
      AZURE_OPENAI_DEPLOYMENT_NAME: mock-deployment
      AZURE_OPENAI_MODEL_NAME: gpt-4o
      AZURE_OPENAI_API_KEY: mock-api-key-for-testing
      COSMOSDB_ENDPOINT: https://mock-cosmosdb.documents.azure.com:443/
      COSMOSDB_DATABASE: mock_database
      COSMOSDB_CONTAINER: mock_container
      COSMOS_CONNECTION_STRING: AccountEndpoint=https://mock-cosmosdb.documents.azure.com:443/;AccountKey=mock-key;
      AZURE_TENANT_ID: 00000000-0000-0000-0000-000000000000
      AZURE_CLIENT_ID: 00000000-0000-0000-0000-000000000000
      AZURE_CLIENT_SECRET: mock-secret
      AZURE_SUBSCRIPTION_ID: 00000000-0000-0000-0000-000000000000
      AZURE_AI_SUBSCRIPTION_ID: 00000000-0000-0000-0000-000000000000
      AZURE_AI_RESOURCE_GROUP: mock-resource-group
      AZURE_AI_PROJECT_NAME: mock-project-name
      AZURE_AI_AGENT_ENDPOINT: https://mock-agent-endpoint.azure.com/
      CONNECTOR_DEMO_MODE: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/backend/requirements.txt
          pip install pytest pytest-cov

      - name: Check if test files exist
        id: check_tests
        run: |
          if [ -z "$(find src/backend -type f -name 'test_*.py')" ]; then
            echo "No test files found, skipping tests."
            echo "skip_tests=true" >> $GITHUB_OUTPUT
          else
            echo "Test files found, running tests."
            echo "skip_tests=false" >> $GITHUB_OUTPUT
          fi

      - name: Run tests with coverage
        if: steps.check_tests.outputs.skip_tests != 'true'
        run: |
          cd src/backend
          pytest --cov=. --cov-report=term-missing --cov-report=xml

      - name: Skip coverage report if no tests
        if: steps.check_tests.outputs.skip_tests == 'true'
        run: |
          echo "Skipping coverage report because no tests were found."

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Frontend lint
        working-directory: src/frontend
        run: npm run lint

      - name: Frontend build
        working-directory: src/frontend
        run: npm run build

      - name: Check if frontend test files exist
        id: check_frontend_tests
        working-directory: src/frontend
        run: |
          if [ -z "$(find src -type f \( -name '*.test.ts' -o -name '*.test.tsx' -o -name '*.spec.ts' -o -name '*.spec.tsx' \))" ]; then
            echo "No frontend test files found, skipping tests."
            echo "skip_tests=true" >> $GITHUB_OUTPUT
          else
            echo "Test files found, running tests."
            echo "skip_tests=false" >> $GITHUB_OUTPUT
          fi

      - name: Frontend tests
        if: steps.check_frontend_tests.outputs.skip_tests != 'true'
        working-directory: src/frontend
        run: npm run test -- --run

      - name: Skip frontend tests notice
        if: steps.check_frontend_tests.outputs.skip_tests == 'true'
        run: echo "Skipping frontend tests - no test files found"

  infra-validation:
    name: Validate Infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: YAML lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: |
            azure.yaml
            .github/workflows/
          config_file: .yamllint.yml

      - name: Install and Validate Bicep
        uses: azure/CLI@v2
        with:
          inlineScript: |
            set -e
            az bicep install
            az bicep version
            az bicep build --file infra/main.bicep
