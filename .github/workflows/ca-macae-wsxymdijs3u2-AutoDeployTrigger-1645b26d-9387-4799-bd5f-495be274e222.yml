name: Trigger auto deployment for ca-macae-wsxymdijs3u2

on:
  push:
    branches:
      - main
    paths:
      - "src/backend/**"
      - "src/backend/Dockerfile"
      - ".github/workflows/ca-macae-wsxymdijs3u2-AutoDeployTrigger-1645b26d-9387-4799-bd5f-495be274e222.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push backend image to ACR
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/src/backend
          dockerfilePath: Dockerfile
          registryUrl: boatrentalacr.azurecr.io
          registryUsername: ${{ secrets.CAMACAEWSXYMDIJS3U2_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CAMACAEWSXYMDIJS3U2_REGISTRY_PASSWORD }}
          containerAppName: ca-macae-wsxymdijs3u2
          resourceGroup: boat-rental-app-group-eus2-clean
          imageToBuild: boatrentalacr.azurecr.io/macaebackend:${{ github.sha }}
