[pytest]
pythonpath = .
log_cli = true
log_cli_level = INFO
log_file = logs/tests.log
log_file_level = INFO
addopts = -p no:warnings

markers =
    gp: Golden Path tests
    intent: Intent classification tests (IntentRouter accuracy)
    inspector: MCP Inspector presence tests (cross-cutting)
    team_routing: Team-specific quick task routing tests
    integration: Cross-phase integration tests (Plan/Chat/Home transitions)
